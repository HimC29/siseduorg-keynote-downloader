<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keynote Downloader</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="greyed">
        <span>⚠️ Open a keynote editor<br>on sisedu.org first.</span>
    </div>

    <header>
        <img src="../media/logo.png" alt="Logo" id="logo">
        <div>
            <h1>Keynote Downloader</h1>
            <p>sisedu.org</p>
        </div>
    </header>

    <main>
        <p class="hint">Click the button below to download the current keynote as a PDF.</p>
        <button id="download">⬇ Download Keynote</button>
        <div id="status"></div>
    </main>

    <script src="main.js"></script>
</body>
</html>
